<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusBite – Canteen Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    .order-card { transition: all 0.3s ease; }
    .order-card.ready { opacity: 0.5; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn 0.4s ease; }
    .ping-dot { animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite; }
    @keyframes ping { 75%,100%{transform:scale(2);opacity:0} }
  </style>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        brand: { DEFAULT: '#f97316', dark: '#ea580c' },
        surface: { DEFAULT: '#0f172a', card: '#1e293b', elevated: '#334155' }
      }}}
    }
  </script>
</head>
<body class="bg-surface text-white min-h-screen">

<!-- TOPBAR -->
<nav class="sticky top-0 z-30 glass border-b border-white/10 px-6 py-4">
  <div class="max-w-6xl mx-auto flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-2xl">🍽️</span>
      <div>
        <span class="font-bold text-lg">Campus<span class="text-brand">Bite</span></span>
        <span class="ml-2 text-xs bg-orange-500/20 text-orange-400 px-2 py-0.5 rounded-full font-medium">Staff Dashboard</span>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2 text-sm text-slate-400">
        <span class="relative flex h-2 w-2">
          <span class="ping-dot absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
          <span class="relative inline-flex h-2 w-2 rounded-full bg-green-400"></span>
        </span>
        <span id="refresh-indicator">Live</span>
      </div>
      <a href="/now-serving" target="_blank" class="text-xs bg-amber-500/20 text-amber-400 hover:bg-amber-500/30 px-3 py-1.5 rounded-full transition-colors font-medium">
        📺 Now Serving Board →
      </a>
      <a href="/" class="text-xs bg-surface-elevated hover:bg-surface-card px-3 py-1.5 rounded-full transition-colors text-slate-400">
        Student View
      </a>
    </div>
  </div>
</nav>

<!-- STAT CARDS -->
<div class="max-w-6xl mx-auto px-6 py-6">
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    <div class="bg-surface-card rounded-2xl p-4 border border-white/10">
      <p class="text-slate-400 text-xs uppercase tracking-wider mb-1">Total Orders</p>
      <p class="text-3xl font-extrabold" id="stat-total">–</p>
    </div>
    <div class="bg-surface-card rounded-2xl p-4 border border-white/10">
      <p class="text-slate-400 text-xs uppercase tracking-wider mb-1">Pending</p>
      <p class="text-3xl font-extrabold text-yellow-400" id="stat-pending">–</p>
    </div>
    <div class="bg-surface-card rounded-2xl p-4 border border-white/10">
      <p class="text-slate-400 text-xs uppercase tracking-wider mb-1">Ready</p>
      <p class="text-3xl font-extrabold text-green-400" id="stat-ready">–</p>
    </div>
    <div class="bg-surface-card rounded-2xl p-4 border border-white/10">
      <p class="text-slate-400 text-xs uppercase tracking-wider mb-1">With Cutlery</p>
      <p class="text-3xl font-extrabold text-blue-400" id="stat-cutlery">–</p>
    </div>
  </div>

  <!-- FILTER TABS -->
  <div class="flex gap-2 mb-6">
    <button id="tab-all" onclick="setFilter('all')" class="px-4 py-2 rounded-full text-sm font-semibold bg-brand text-white transition-all">All</button>
    <button id="tab-paid" onclick="setFilter('paid')" class="px-4 py-2 rounded-full text-sm font-semibold bg-surface-card border border-white/10 text-slate-400 hover:text-white transition-all">⏳ Pending</button>
    <button id="tab-ready" onclick="setFilter('ready')" class="px-4 py-2 rounded-full text-sm font-semibold bg-surface-card border border-white/10 text-slate-400 hover:text-white transition-all">✅ Ready</button>
  </div>

  <!-- ORDERS LIST -->
  <div id="orders-container" class="space-y-4">
    <div class="text-center text-slate-400 py-16">
      <div class="text-4xl mb-3">⏳</div>
      <p>Loading orders...</p>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="fixed bottom-6 right-6 bg-green-600 text-white px-5 py-3 rounded-2xl font-semibold text-sm shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-50">
  ✅ Order marked as ready!
</div>

<script>
  let allOrders = [];
  let currentFilter = 'all';
  let refreshInterval;

  async function loadOrders() {
    try {
      const res = await fetch('/api/orders');
      const data = await res.json();
      allOrders = data.orders;
      updateStats();
      renderOrders();
      document.getElementById('refresh-indicator').textContent = 'Live · ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    } catch(e) {
      console.error('Failed to load orders', e);
    }
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = allOrders.length;
    document.getElementById('stat-pending').textContent = allOrders.filter(o => o.status === 'paid').length;
    document.getElementById('stat-ready').textContent = allOrders.filter(o => o.status === 'ready').length;
    document.getElementById('stat-cutlery').textContent = allOrders.filter(o => o.cutlery).length;
  }

  function setFilter(f) {
    currentFilter = f;
    ['all','paid','ready'].forEach(id => {
      const el = document.getElementById(`tab-${id}`);
      if (id === f) {
        el.className = 'px-4 py-2 rounded-full text-sm font-semibold bg-brand text-white transition-all';
      } else {
        el.className = 'px-4 py-2 rounded-full text-sm font-semibold bg-surface-card border border-white/10 text-slate-400 hover:text-white transition-all';
      }
    });
    renderOrders();
  }

  function renderOrders() {
    const container = document.getElementById('orders-container');
    let filtered = allOrders;
    if (currentFilter === 'paid') filtered = allOrders.filter(o => o.status === 'paid');
    if (currentFilter === 'ready') filtered = allOrders.filter(o => o.status === 'ready');
    filtered = [...filtered].reverse(); // newest first

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="text-center text-slate-400 py-16 fade-in">
          <div class="text-4xl mb-3">${currentFilter === 'ready' ? '✅' : '📋'}</div>
          <p>${currentFilter === 'paid' ? 'No pending orders!' : currentFilter === 'ready' ? 'No orders are ready yet.' : 'No orders yet.'}</p>
        </div>`;
      return;
    }

    container.innerHTML = filtered.map(order => `
      <div class="order-card fade-in bg-surface-card rounded-2xl p-5 border ${order.status === 'ready' ? 'border-green-500/30 ready' : 'border-white/10'}" id="order-${order.id}">
        <div class="flex items-start justify-between gap-4">
          <div class="flex items-center gap-4">
            <!-- Token Badge -->
            <div class="flex-shrink-0 w-16 h-16 rounded-2xl ${order.status === 'ready' ? 'bg-green-500/20 border-green-500/40' : 'bg-orange-500/20 border-orange-500/40'} border flex flex-col items-center justify-center">
              <span class="text-xs text-slate-400 leading-none">#</span>
              <span class="text-2xl font-extrabold ${order.status === 'ready' ? 'text-green-400' : 'text-brand'} leading-none">${order.token}</span>
            </div>
            <div>
              <div class="flex items-center gap-2 mb-1">
                <p class="font-bold text-base">${order.student_name || 'Student'}</p>
                <span class="text-xs text-slate-500">${order.roll_number}</span>
              </div>
              <p class="text-slate-300 text-sm mb-1">${order.items}</p>
              <div class="flex items-center gap-3 flex-wrap">
                ${order.cutlery ? '<span class="text-xs bg-blue-500/20 text-blue-300 px-2 py-0.5 rounded-full">🍴 Cutlery</span>' : ''}
                <span class="text-xs text-slate-500">${order.created_at}</span>
                <span class="text-xs font-bold text-brand">₹${order.total_price}</span>
              </div>
            </div>
          </div>

          <div class="flex-shrink-0 text-right">
            ${order.status === 'ready'
              ? `<span class="inline-flex items-center gap-1 bg-green-500/20 text-green-400 px-3 py-1.5 rounded-full text-sm font-semibold">✅ Ready</span>`
              : `<button onclick="markReady(${order.id})" class="bg-brand hover:bg-brand-dark text-white px-4 py-2 rounded-xl text-sm font-bold transition-colors active:scale-95">
                  Mark Ready ✓
                </button>`
            }
          </div>
        </div>
      </div>
    `).join('');
  }

  async function markReady(orderId) {
    try {
      const res = await fetch(`/api/orders/${orderId}/mark-ready`, { method: 'POST' });
      if (res.ok) {
        showToast();
        await loadOrders();
      }
    } catch(e) { console.error(e); }
  }

  function showToast() {
    const toast = document.getElementById('toast');
    toast.style.opacity = '1';
    setTimeout(() => toast.style.opacity = '0', 3000);
  }

  // Admin demo controls
  async function setMockTime(t) {
    await fetch(`/admin/set-time?time_str=${t}`, { method: 'POST' });
    alert(`Mock time set to ${t || 'real time'}`);
  }
  async function resetAllOrders() {
    if (!confirm('Clear ALL orders for a fresh demo?')) return;
    await fetch('/admin/reset', { method: 'DELETE' });
    await loadOrders();
    showToast();
    document.getElementById('toast').textContent = '🗑️ All orders cleared!';
  }

  loadOrders();
  refreshInterval = setInterval(loadOrders, 8000); // refresh every 8 seconds
</script>

<!-- ADMIN DEV TOOLS (collapsible at bottom) -->
<div class="max-w-6xl mx-auto px-6 pb-8">
  <details class="mt-8">
    <summary class="cursor-pointer text-xs text-slate-600 hover:text-slate-400 select-none">⚙️ Demo Admin Controls</summary>
    <div class="mt-3 bg-surface-card border border-white/5 rounded-2xl p-4 flex flex-wrap gap-3">
      <button onclick="setMockTime('11:30')" class="text-xs bg-green-900/40 text-green-400 hover:bg-green-900/60 px-3 py-2 rounded-xl transition-colors">⏰ Simulate 11:30 AM (Open)</button>
      <button onclick="setMockTime('12:30')" class="text-xs bg-red-900/40 text-red-400 hover:bg-red-900/60 px-3 py-2 rounded-xl transition-colors">⏰ Simulate 12:30 PM (Closed)</button>
      <button onclick="setMockTime('')" class="text-xs bg-surface-elevated text-slate-400 hover:bg-white/10 px-3 py-2 rounded-xl transition-colors">⏰ Use Real Time</button>
      <button onclick="resetAllOrders()" class="text-xs bg-red-900/40 text-red-400 hover:bg-red-900/60 px-3 py-2 rounded-xl transition-colors">🗑️ Reset All Orders</button>
    </div>
  </details>
</div>
</body>
</html>
